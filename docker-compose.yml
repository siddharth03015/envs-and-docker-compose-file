version: "3.9"

services:
  # ── Exchange Engine (Go) ────────────────────────────────────────────────────
  exchange-engine:
    build:
      context: ./exchange-engine
      dockerfile: Dockerfile
    container_name: synthetic-bull-engine
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_PATH: "/data/exchange.db"
      JWT_SECRET: "synthetic-bull-secret-change-in-prod"
    volumes:
      - exchange_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Web Terminal (React + Vite) ─────────────────────────────────────────────
  web-terminal:
    build:
      context: ./web-terminal
      dockerfile: Dockerfile
    container_name: synthetic-bull-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://localhost:8080"
      VITE_WS_URL: "ws://localhost:8080"
    depends_on:
      exchange-engine:
        condition: service_healthy
    restart: unless-stopped

  # ── Trading Bots (Python) ───────────────────────────────────────────────────
  trading-bots:
    build:
      context: ./trading-bots
      dockerfile: Dockerfile
    container_name: synthetic-bull-bots
    ports:
      - "9090:9090"
    environment:
      ENGINE_URL:   "http://exchange-engine:8080"
      BOT_PASSWORD: "bot-secret-2026"
      METRICS_PORT: "9090"
    depends_on:
      exchange-engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  exchange_data:
    driver: local
